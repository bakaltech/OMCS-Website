<main>
  <section class="py-section bg-[#F9F5F0]">
    <div class="container mx-auto px-4 max-w-2xl">
      <h1 class="text-5xl font-display text-center mb-12">Partner With Us</h1>
      <div class="bg-[#FEFCF8] rounded-2xl p-8 shadow-sm">
        <p class="mb-6">Interested in partnering with OMCS? Fill out the form below and we'll be in touch.</p>
        <form>
          <div class="mb-4">
            <label class="block mb-2">Organization Name</label>
            <input type="text" class="w-full p-3 border border-[#E2D9CE] rounded-lg">
          </div>
          <div class="mb-4">
            <label class="block mb-2">Contact Person</label>
            <input type="text" class="w-full p-3 border border-[#E2D9CE] rounded-lg">
          </div>
          <div class="mb-4">
            <label class="block mb-2">Email</label>
            <input type="email" class="w-full p-3 border border-[#E2D9CE] rounded-lg">
          </div>
          <div class="mb-4">
            <label class="block mb-2">Message</label>
            <textarea rows="4" class="w-full p-3 border border-[#E2D9CE] rounded-lg"></textarea>
          </div>
          <button class="w-full bg-[#0B4D3C] text-white px-6 py-3 rounded-full font-semibold hover:bg-[#1A6B4F] transition">Submit Inquiry</button>
        </form>
      </div>
    </div>
  </section>
</main>
